<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Database - JMystery</title>
<meta name="description" content="Browse and filter 35+ translated Japanese mystery novels. Compare subgenres, eras, authors, and find your next read.">
<meta property="og:title" content="JMystery - Novel Database">
<meta property="og:description" content="Browse and filter 35+ translated Japanese mystery novels by subgenre, era, and availability.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://humancronadmin.github.io/j-mystery/database.html">
<link rel="canonical" href="https://humancronadmin.github.io/j-mystery/database.html">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-brand">J<span>Mystery</span></a>
  <div class="nav-links">
    <a href="database.html" class="active">Database</a>
    <a href="index.html#guides">Guides</a>
    <a href="index.html#about">About</a>
  </div>
</nav>
<div class="db-header">
  <h1>Novel Database</h1>
  <p>Unlock Japanese mystery. One book at a time.</p>
</div>
<div class="filters">
  <input type="search" id="search" placeholder="Search title or author...">
  <select id="subgenre"><option value="">All Subgenres</option></select>
  <select id="era"><option value="">All Eras</option></select>
  <select id="availability"><option value="">All Availability</option></select>
  <select id="sort">
    <option value="">Sort by...</option>
    <option value="year-asc">Year: Old to New</option>
    <option value="year-desc">Year: New to Old</option>
    <option value="name-asc">Title: A to Z</option>
    <option value="author-asc">Author: A to Z</option>
  </select>
</div>
<div class="result-count" id="resultCount"></div>
<div class="product-grid" id="grid"></div>
<footer class="footer">
  <p>JMystery is an open-source project. <a href="https://github.com/humancronadmin">GitHub</a></p>
</footer>
<script src="js/database.js"></script>
</body>
</html>
